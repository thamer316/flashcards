<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعديلات ملف الكيمياء</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #ffffff;
      font-family: Arial, Tahoma, sans-serif;
      text-align: center;
    }

    .page-block {
      margin-bottom: 40px;
      border: 1px solid #000;
      padding: 5px;
    }

    .page-title {
      color: #000;
      font-size: 24px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .watch-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      color: #000;
      text-decoration: none;
      border: 1px solid #000;
      padding: 4px 10px;
      border-radius: 5px;
    }

    .page-block img {
      display: block;
      margin: 0 auto;
      max-width: 700px;
      width: 100%;
      height: auto;
    }

    .img-wrap {
      position: relative;
      display: inline-block;
      width: 100%;
    }

    .img-wrap img.deleted {
      opacity: 0.7;
    }

    .deleted-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: red;
      font-size: 56px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.6);
      padding: 5px 20px;
      border-radius: 5px;
    }

    @media (min-width: 769px) {
      .page-block {
        border: none;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 0;
      }

      .page-block img {
        max-width: 100%;
        width: 100%;
      }
    }

    @media print {

      .page-block,
      .img-wrap,
      .row {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .page-block img,
      .row img {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 20px;
      page-break-inside: avoid;
    }

    .row img {
      display: block;
      height: auto;
      border-radius: 6px;
    }

    .row .full {
      width: 100%;
    }

    .row .small {
      width: 30%;
    }

    .row-divider {
      border: none;
      border-top: 1px solid #ccc;
      margin: 20px 0;
    }

    @media print {
      .row-divider {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="page-block">
    <div class="page-title">صفحة 138</div>
    <img src="images/138.png" alt="صفحة 138">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 67</div>
    <img src="images/67.png" alt="صفحة 67">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 13</div>
    <img src="images/13.png" alt="صفحة 13">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 18</div>
    <img src="images/18.png" alt="صفحة 18">
  </div>

  <div class="page-block">
    <div class="page-title">
      صفحة 30
      <a class="watch-btn" href="https://www.youtube.com/watch?v=bpjFYTp8FWY&feature=youtu.be&themeRefresh=1"
        target="_blank" rel="noopener">
        مشاهدة التعديل ←
      </a>
    </div>
    <img src="images/30.png" alt="صفحة 30">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 58</div>
    <img src="images/58.png" alt="صفحة 58">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 93</div>
    <img src="images/93.png" alt="صفحة 93">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 118</div>
    <img src="images/118.png" alt="صفحة 118">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 156</div>
    <img src="images/156.png" alt="صفحة 156">
  </div>
  <div class="page-block">
    <div class="page-title">صفحة 293</div>
    <div class="img-wrap">
      <img class="deleted" src="images/293.png" alt="صفحة 293">
      <div class="deleted-badge">محذوف</div>
    </div>
  </div>
  <div class="page-block">
    <div class="page-title">صفحة 309</div>
    <img src="images/309.png" alt="صفحة 309">

  <div class="row">
    <img class="small" src="الصور/3.png">
    <img class="small" src="الصور/4.png">

  </div>
  <hr class="row-divider">
  <div class="row">
    <img class="small" src="الصور/6.png">
    <img class="small" src="الصور/7.png">
    <img class="small" src="الصور/8.png">
  </div>
  <hr class="row-divider">
  <div class="row">
    <img class="small" src="الصور/9.png">
    <img class="small" src="الصور/10.png">
  </div>
  <hr class="row-divider">
  <div class="row">
    <img class="full" src="الصور/13-full.png">
  </div>

</body>

</html>
