<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعديلات ملف الكيمياء</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 20px;
    background: #ffffff;
    font-family: Arial, Tahoma, sans-serif;
    text-align: center;
  }

  .page-block {
    margin-bottom: 40px;
    border: 1px solid #000;
    padding: 5px;
  }

  .page-title {
    color: #000;
    font-size: 24px;
    margin-bottom: 10px;
  }

  .page-block img {
    display: block;
    margin: 0 auto;
    max-width: 700px;
    width: 100%;
    height: auto;
  }

  @media (min-width: 769px) {
    .page-block {
      border: none;
    }
  }

  @media (max-width: 768px) {
    body {
      padding: 0;
    }

    .page-block img {
      max-width: 100%;
      width: 100%;
    }
  }
</style>
</head>
<body>

  <div class="page-block">
    <div class="page-title">صفحة 13</div>
    <img src="images/13.png" alt="صفحة 13">
  </div>

  <div class="page-block">
    <div class="page-title">صفحة 93</div>
    <img src="images/93.png" alt="صفحة 93">
  </div>

</body>
</html>
