<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السؤال 177</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            padding: 30px 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .note {
            text-align: right;
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
            padding-right: 5px;
        }
        
        .video-container {
            width: 100%;
            margin-bottom: 50px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .video-container iframe {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }
        
        .modification-image {
            width: 100%;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .modification-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="note">* تم تعديل حل هذا السؤال</div>
        
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/fUJXQHTsgN4" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        
        <div class="modification-image">
            <img src="../modifications/177.png" alt="السؤال 177">
        </div>
    </div>
</body>
</html>
