<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #qrcode {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }
        
        #qrcode canvas {
            max-width: 100%;
            height: auto;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .button-group button {
            margin: 0;
        }
        
        .download-btn {
            background: #4caf50;
        }
        
        .download-btn:hover {
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .reset-btn {
            background: #ff9800;
        }
        
        .reset-btn:hover {
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.4);
        }
        
        .filename-group {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }
        
        .filename-group.show {
            display: flex;
        }
        
        .filename-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .filename-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .filename-group button {
            padding: 10px 15px;
            font-size: 14px;
        }
        
        .info-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 مولد QR Code</h1>
        
        <div class="input-group">
            <label for="qrInput">أدخل النص أو الرابط:</label>
            <input type="text" id="qrInput" placeholder="https://example.com أو أي نص">
        </div>
        
        <button onclick="generateQR()">توليد QR Code</button>
        
        <div id="qrcode"></div>
        
        <div class="button-group" id="buttonGroup" style="display:none;">
            <button class="download-btn" onclick="showFilenameInput()">تحميل مع تسمية</button>
            <button class="download-btn" onclick="downloadQR()">تحميل مباشر</button>
        </div>
        
        <div class="filename-group" id="filenameGroup">
            <input type="text" id="filename" placeholder="اكتب اسم الملف (بدون .png)">
            <button class="download-btn" onclick="downloadWithFilename()">✓ تحميل</button>
            <button class="reset-btn" onclick="resetFilename()">✕ إلغاء</button>
        </div>
        
        <p class="info-text">أدخل رابط أو نص وسيتم توليد QR Code له تلقائياً</p>
    </div>
    
    <script>
        let qrCode = null;
        
        function generateQR() {
            const input = document.getElementById('qrInput').value.trim();
            const qrcodeDiv = document.getElementById('qrcode');
            const buttonGroup = document.getElementById('buttonGroup');
            
            if (!input) {
                alert('من فضلك أدخل نص أو رابط');
                return;
            }
            
            // مسح QR code القديم
            qrcodeDiv.innerHTML = '';
            
            // توليد QR code جديد
            qrCode = new QRCode(qrcodeDiv, {
                text: input,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
            
            // إظهار أزرار التحميل
            setTimeout(() => {
                buttonGroup.style.display = 'grid';
            }, 100);
        }
        
        function downloadQR() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            if (!qrCanvas) {
                alert('من فضلك وليد QR Code أولاً');
                return;
            }
            
            const link = document.createElement('a');
            link.href = qrCanvas.toDataURL('image/png');
            link.download = 'QRCode.png';
            link.click();
        }
        
        function showFilenameInput() {
            const filenameGroup = document.getElementById('filenameGroup');
            const filename = document.getElementById('filename');
            filenameGroup.classList.add('show');
            filename.focus();
        }
        
        function downloadWithFilename() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            const filename = document.getElementById('filename').value.trim();
            
            if (!qrCanvas) {
                alert('من فضلك وليد QR Code أولاً');
                return;
            }
            
            if (!filename) {
                alert('من فضلك أدخل اسم الملف');
                return;
            }
            
            // إضافة الامتداد .png إذا لم يكن موجوداً
            const fullFilename = filename.endsWith('.png') ? filename : filename + '.png';
            
            const link = document.createElement('a');
            link.href = qrCanvas.toDataURL('image/png');
            link.download = fullFilename;
            link.click();
            
            // إخفاء حقل التسمية بعد التحميل
            resetFilename();
        }
        
        function resetFilename() {
            const filenameGroup = document.getElementById('filenameGroup');
            const filename = document.getElementById('filename');
            filenameGroup.classList.remove('show');
            filename.value = '';
        }
        
        // السماح بالضغط على Enter لتوليد QR
        document.getElementById('qrInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQR();
            }
        });
        
        // السماح بالضغط على Enter في حقل الاسم للتحميل
        document.getElementById('filename').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                downloadWithFilename();
            }
        });
    </script>
</body>
</html>
