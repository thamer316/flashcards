<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديلات الرياضيات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            padding: 30px 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 50px;
            font-size: 32px;
        }
        
        .modifications-grid {
            display: flex;
            flex-direction: column;
            gap: 80px;
            margin-bottom: 60px;
        }
        
        .modification-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .modification-image {
            width: 100%;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }
        
        .modification-image img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .modification-image img.error {
            background: #f5f5f5;
            min-height: 300px;
            object-fit: cover;
        }
        
        .qr-code-container {
            width: 100px;
            height: 100px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }
        
        .qr-code-container img {
            width: 100%;
            height: 100%;
            padding: 5px;
        }
        
        .modification-label {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 10px;
            font-weight: 500;
        }
        
        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-message p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .modifications-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .modification-image {
                max-width: 100%;
            }
            
            .qr-code-container {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="modifications-grid" id="modificationsGrid">
            <!-- سيتم إضافة التعديلات هنا -->
        </div>
    </div>
    
    <script>
        // بيانات التعديلات - يتم قراءتها من المجلدات
        const modifications = [
            { id: 1, label: 'التعديل 1' },
            { id: 2, label: 'التعديل 2' },
            { id: 3, label: 'التعديل 3' },
            { id: 4, label: 'التعديل 4' },
            { id: 5, label: 'التعديل 5' }
        ];
        
        // دالة لإنشاء عنصر تعديل واحد
        function createModificationItem(mod) {
            const item = document.createElement('div');
            item.className = 'modification-item';
            
            // الصورة
            const imageDiv = document.createElement('div');
            imageDiv.className = 'modification-image';
            
            const img = document.createElement('img');
            img.src = `modifications/${mod.id}.png`;
            img.alt = mod.label;
            img.onerror = function() {
                this.classList.add('error');
                this.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23f5f5f5%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2216%22 fill=%22%23999%22%3Eالصورة غير موجودة%3C/text%3E%3C/svg%3E';
            };
            
            imageDiv.appendChild(img);
            item.appendChild(imageDiv);
            
            // QR Code
            const qrDiv = document.createElement('div');
            qrDiv.className = 'qr-code-container';
            
            const qrImg = document.createElement('img');
            qrImg.src = `qrcodes/qr${mod.id}.png`;
            qrImg.alt = `QR Code ${mod.id}`;
            qrImg.onerror = function() {
                this.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23f5f5f5%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E';
            };
            
            qrDiv.appendChild(qrImg);
            item.appendChild(qrDiv);
            
            // التسمية
            const label = document.createElement('div');
            label.className = 'modification-label';
            label.textContent = mod.label;
            item.appendChild(label);
            
            return item;
        }
        
        // دالة تحميل التعديلات
        function loadModifications() {
            const grid = document.getElementById('modificationsGrid');
            
            if (modifications.length === 0) {
                grid.innerHTML = '<div class="empty-message"><p>لا توجد تعديلات للعرض</p></div>';
                return;
            }
            
            // استخدام map لإنشاء العناصر
            modifications.map(mod => createModificationItem(mod))
                .forEach(element => grid.appendChild(element));
        }
        
        // تحميل التعديلات عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', loadModifications);
    </script>
</body>
</html>
